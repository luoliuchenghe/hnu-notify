name: 湖南大学通知日报

on:
  schedule:
    # 每天 UTC 0:00 运行 = 北京时间 8:00
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  check-and-notify:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # 用 unique key 确保每次运行都保存 seen.json（避免重复发送）
      - name: 恢复 seen.json 缓存
        uses: actions/cache@v4
        id: cache-seen
        with:
          path: seen.json
          key: hnu-notify-seen-${{ github.run_id }}
          restore-keys: |
            hnu-notify-seen-

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 抓取通知 → AI 分析 → 发送邮件
        run: node index.js
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_FROM_NAME: ${{ secrets.MAIL_FROM_NAME }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
