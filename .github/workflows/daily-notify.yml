name: 湖南大学通知日报

on:
  schedule:
    # 每天 UTC 0:00 运行 = 北京时间 8:00
    - cron: '0 0 * * *'
  workflow_dispatch:
    # 支持手动触发，方便测试

jobs:
  check-and-notify:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 恢复 seen.json 缓存（避免重复通知）
        uses: actions/cache@v4
        with:
          path: seen.json
          key: hnu-notify-seen
          # 每次运行都保存更新后的 seen.json，防止重复发送
          save-always: true

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 抓取通知并发送邮件
        run: node index.js
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_FROM_NAME: ${{ secrets.MAIL_FROM_NAME }}
